name: Test
permissions:
  contents: read
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        go:
          - '1.23'
          - '1.24'
          - '1'
    steps:
      - name: Set up Go ${{ matrix.go }}
        uses: actions/setup-go@0caeaed6fd66a828038c2da3c0f662a42862658f #v1.1.3
        with:
          go-version: ${{ matrix.go }}
      - name: Check out code
        uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5 #v2.7.0
        with:
          path: src/github.com/aws/aws-xray-sdk-go
      - name: Test
        run: make test-with-race
        shell: bash
        working-directory: src/github.com/aws/aws-xray-sdk-go

  benchmark:
    name: XRay-Go-SDK-Benchmarking
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
        go:
          - '1.24'
    steps:
      - name: Set up Go ${{ matrix.go }}
        uses: actions/setup-go@0caeaed6fd66a828038c2da3c0f662a42862658f #v1.1.3
        with:
          go-version: ${{ matrix.go }}
        id: go
      - name: Check out code
        uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5 #v2.7.0
        with:
          path: src/github.com/aws/aws-xray-sdk-go
      - name: Benchmark
        run: go test -v -benchmem -run=^$$ -bench=. ./... | tee benchmark/output.txt
        shell: bash
        working-directory: src/github.com/aws/aws-xray-sdk-go

  static-code-checks:
    runs-on: ubuntu-latest
    steps:

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 #5.0.0
        with:
          fetch-depth: 0
      - name: Check for versioned GitHub actions
        if: always()
        run: |
          # Get changed GitHub workflow/action files
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}..HEAD | grep -E "^\.github/(workflows|actions)/.*\.ya?ml$" || true)
          
          if [ -n "$CHANGED_FILES" ]; then
            # Check for any versioned actions, excluding comments and this validation script
            VIOLATIONS=$(grep -Hn "uses:.*@v" $CHANGED_FILES | grep -v "grep.*uses:.*@v" | grep -v "#.*@v" || true)
            if [ -n "$VIOLATIONS" ]; then
              echo "Found versioned GitHub actions. Use commit SHAs instead:"
              echo "$VIOLATIONS"
              exit 1
            fi
          fi
          
          echo "No versioned actions found in changed files"